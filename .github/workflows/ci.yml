name: CI Tests (Expected FAIL)

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pytest selenium
      
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      
      - name: Start server
        run: |
          if [ -d "public" ]; then cd public; fi
          python3 -m http.server 8000 &
          sleep 5
      
      - name: Run tests
        id: tests
        continue-on-error: true
        run: pytest tests/ -v
      
      - name: Create Bug Report
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐛 Bug Report: CI Tests Failed - ${context.sha.substring(0,7)}`,
              labels: ['bug', 'ci'],
              body: `## 🐛 Баг-репорт

              **Обнаружена проблема в CI тестах!**

              ### Детали:
              - **Ветка:** ${context.ref}
              - **Коммит:** ${context.sha}
              - **Автор:** ${context.actor}
              - **Время:** ${new Date().toLocaleString()}

              ### Логи ошибок:
              \`\`\`
              Проверьте логи в GitHub Actions
              \`\`\`

              ### Ссылка на запуск:
              ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

              ### Шаги для воспроизведения:
              1. Запустить CI workflow
              2. Тесты падают с ошибкой

              ---
              *Автоматически созданный баг-репорт из CI/CD пайплайна*`
            });
